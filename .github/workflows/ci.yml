name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (test / clippy / fmt)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # tauri_build needs the sidecar to EXIST even for `cargo clippy`/`test`,
      # but these never run it — a stub satisfies the check instantly (vs the
      # ~40-min from-source build the real one needs).
      - uses: ./.github/actions/build-llama-sidecar
        with:
          placeholder: "true"

      - name: cargo fmt --check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml --all-targets

  frontend:
    name: Frontend (vitest / lint / fmt)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: oxlint
        run: npm run lint

      - name: oxfmt --check
        run: npm run format:check

      - name: vitest
        run: npm run test

  e2e:
    name: E2E (WebdriverIO + @wdio/tauri-service)
    runs-on: macos-26
    needs: [rust, frontend]
    # On-demand only: the e2e suite drives the real app against a real GGUF
    # model, which CI does not provision yet (a multi-GB model download/cache is
    # a separate task), so it can't pass on push/PR — running it there just
    # paints a permanent red check. Gate it to manual `workflow_dispatch` so
    # automated runs stay clean; trigger it by hand when a model is available.
    # (Kept out of the release gate too — `release` only needs rust+frontend.)
    if: github.event_name == 'workflow_dispatch'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: ./.github/actions/build-llama-sidecar

      # No separate build step: `npm run test:e2e`'s own `pretest:e2e` hook
      # (tests/e2e/build-for-e2e.sh) builds both frontend and backend with
      # the wdio bridge included — a plain `npm run tauri build -- --debug`
      # here first was pure redundant work (~3 extra minutes) building an
      # artifact that gets immediately superseded and never used.
      - name: Run e2e suite
        run: npm run test:e2e

      - name: Upload e2e diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics
          # @wdio/tauri-service's captureBackendLogs/captureFrontendLogs
          # write here by default (wdio.conf.ts's own startup log confirmed
          # this exact path: "Log capture initialized: .../doce/logs") — not
          # tests/e2e/logs/, which was an unconfirmed guess in an earlier
          # version of this step and never actually captured anything.
          path: |
            /tmp/doce-e2e-preview.log
            logs/
          if-no-files-found: ignore

  # The public build uses Tauri's supported ad-hoc identity (`-`). This gives
  # the complete app bundle a valid code seal without paid Apple credentials,
  # but it is not Developer ID signed or notarized. macOS users therefore need
  # to approve the app once in System Settings -> Privacy & Security.
  release:
    name: Release (ad-hoc signed .dmg)
    runs-on: macos-26
    # Auto-release on every merge to main (and on explicit v* tags). Gated on
    # rust+frontend only; the real-model e2e suite remains on-demand.
    needs: [rust, frontend]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    # Needed for the Publish step to create the GitHub Release + upload assets.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: ./.github/actions/build-llama-sidecar

      # T091 finding: Tauri's dmg bundler shells out to `create-dmg`, which
      # is not preinstalled by default and isn't a cargo/npm dependency —
      # confirmed by a local release build failing with "failed to run
      # bundle_dmg.sh" until this was installed via Homebrew. `brew install`
      # is a safe no-op if the runner image already has it.
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build ad-hoc signed .dmg
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: |
          # The Rust cache can restore an older version's bundle. Clear only
          # generated bundle outputs so the asset checks below cannot select a
          # stale DMG after a version change.
          rm -rf src-tauri/target/release/bundle/dmg
          rm -rf src-tauri/target/release/bundle/macos
          npm run tauri build

      - name: Verify code seal and disk image
        run: |
          set -euo pipefail
          shopt -s nullglob
          apps=(src-tauri/target/release/bundle/macos/*.app)
          dmgs=(src-tauri/target/release/bundle/dmg/*_aarch64.dmg)
          if (( ${#apps[@]} != 1 || ${#dmgs[@]} != 1 )); then
            echo "Expected one macOS app and one aarch64 DMG; found ${#apps[@]} app(s) and ${#dmgs[@]} DMG(s)." >&2
            exit 1
          fi

          verify_app() {
            local app_bundle="$1"
            local signature_info
            codesign --verify --deep --strict --verbose=4 "$app_bundle"
            signature_info="$(codesign -dv --verbose=4 "$app_bundle" 2>&1)"
            if ! grep -Fqx 'Signature=adhoc' <<<"$signature_info"; then
              echo "Expected an ad-hoc app signature: $app_bundle" >&2
              return 1
            fi
            for executable in \
              "$app_bundle/Contents/MacOS/doce" \
              "$app_bundle/Contents/MacOS/llama-server"; do
              if [[ ! -x "$executable" ]]; then
                echo "Missing executable: $executable" >&2
                return 1
              fi
              lipo "$executable" -verify_arch arm64
            done
          }

          verify_app "${apps[0]}"
          hdiutil verify "${dmgs[0]}"

          # Validate the app users will actually receive, after DMG packaging.
          mount_dir="$(mktemp -d)"
          attached=false
          cleanup() {
            if [[ "$attached" == true ]]; then
              hdiutil detach "$mount_dir" -quiet || true
            fi
            rmdir "$mount_dir" 2>/dev/null || true
          }
          trap cleanup EXIT
          hdiutil attach "${dmgs[0]}" -readonly -nobrowse -noautoopen -mountpoint "$mount_dir" >/dev/null
          attached=true
          mounted_apps=("$mount_dir"/*.app)
          if (( ${#mounted_apps[@]} != 1 )); then
            echo "Expected one app inside the DMG, found ${#mounted_apps[@]}." >&2
            exit 1
          fi
          verify_app "${mounted_apps[0]}"

      # GitHub's /releases/latest/download/<filename> endpoint follows the
      # newest release, but the filename itself must remain stable. Normalize
      # Tauri's versioned build output to a friendly public download name.
      - name: Stage stable download asset
        run: |
          shopt -s nullglob
          dmg_files=(src-tauri/target/release/bundle/dmg/*_aarch64.dmg)
          if (( ${#dmg_files[@]} != 1 )); then
            echo "Expected exactly one DMG, found ${#dmg_files[@]}." >&2
            exit 1
          fi
          mkdir -p release-assets
          cp "${dmg_files[0]}" release-assets/doce-aarch64.dmg
          (
            cd release-assets
            shasum -a 256 doce-aarch64.dmg > doce-aarch64.dmg.sha256
          )

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: doce-dmg
          path: |
            release-assets/doce-aarch64.dmg
            release-assets/doce-aarch64.dmg.sha256
          if-no-files-found: error

      # The release tag: an explicit `v*` tag when pushed as one, otherwise a
      # fresh per-merge tag `v<pkgVersion>.<runNumber>` (e.g. v0.1.0.42) so each
      # merge to main publishes a NEW, uniquely-tagged release.
      - name: Compute release tag
        id: relver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            VERSION=$(node -p "require('./package.json').version")
            TAG="v${VERSION}.${GITHUB_RUN_NUMBER}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      # Publish the GitHub Release + attach the DMG and checksum. Setting
      # `make_latest` forces
      # `releases/latest/download/doce-aarch64.dmg` (the landing page's download
      # button target) to resolve to this build, so the public download always
      # tracks the newest merge.
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.relver.outputs.tag }}
          name: doce ${{ steps.relver.outputs.tag }}
          make_latest: true
          files: |
            release-assets/doce-aarch64.dmg
            release-assets/doce-aarch64.dmg.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
