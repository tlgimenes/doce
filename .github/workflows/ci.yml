name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (test / clippy / fmt)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # tauri_build needs the sidecar to EXIST even for `cargo clippy`/`test`,
      # but these never run it — a stub satisfies the check instantly (vs the
      # ~40-min from-source build the real one needs).
      - uses: ./.github/actions/build-llama-sidecar
        with:
          placeholder: "true"

      - name: cargo fmt --check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml --all-targets

  frontend:
    name: Frontend (vitest / lint / fmt)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: oxlint
        run: npm run lint

      - name: oxfmt --check
        run: npm run format:check

      - name: vitest
        run: npm run test

  e2e:
    name: E2E (WebdriverIO + @wdio/tauri-service)
    runs-on: macos-26
    needs: [rust, frontend]
    # On-demand only: the e2e suite drives the real app against a real GGUF
    # model, which CI does not provision yet (a multi-GB model download/cache is
    # a separate task), so it can't pass on push/PR — running it there just
    # paints a permanent red check. Gate it to manual `workflow_dispatch` so
    # automated runs stay clean; trigger it by hand when a model is available.
    # (Kept out of the release gate too — `release` only needs rust+frontend.)
    if: github.event_name == 'workflow_dispatch'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: ./.github/actions/build-llama-sidecar

      # No separate build step: `npm run test:e2e`'s own `pretest:e2e` hook
      # (tests/e2e/build-for-e2e.sh) builds both frontend and backend with
      # the wdio bridge included — a plain `npm run tauri build -- --debug`
      # here first was pure redundant work (~3 extra minutes) building an
      # artifact that gets immediately superseded and never used.
      - name: Run e2e suite
        run: npm run test:e2e

      - name: Upload e2e diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics
          # @wdio/tauri-service's captureBackendLogs/captureFrontendLogs
          # write here by default (wdio.conf.ts's own startup log confirmed
          # this exact path: "Log capture initialized: .../doce/logs") — not
          # tests/e2e/logs/, which was an unconfirmed guess in an earlier
          # version of this step and never actually captured anything.
          path: |
            /tmp/doce-e2e-preview.log
            logs/
          if-no-files-found: ignore

  # T090 (specs/001-doce-v1-core/tasks.md): only runs on a `v*` tag, after
  # rust/frontend/e2e all pass. UNTESTED against a real Apple Developer
  # account — there is no such account/certificate available in this
  # environment to verify against. This wires the configuration Tauri v2's
  # documented macOS signing/notarization flow expects (research.md § 7);
  # it does not itself obtain or vouch for real credentials. Before this
  # job can produce a signed, notarized build, the repo needs these
  # secrets set (Settings -> Secrets and variables -> Actions):
  #   APPLE_CERTIFICATE          - base64-encoded Developer ID Application
  #                                .p12 certificate
  #   APPLE_CERTIFICATE_PASSWORD - the .p12's export password
  #   APPLE_SIGNING_IDENTITY     - e.g. "Developer ID Application: NAME (TEAMID)"
  #   APPLE_ID                   - Apple ID email used for notarization
  #   APPLE_PASSWORD             - an app-specific password for that Apple ID
  #                                (not the account password)
  #   APPLE_TEAM_ID              - the Developer Team ID
  # Verify these exact variable names against Tauri's current official
  # macOS code-signing guide before relying on this job — they were not
  # confirmed against a real signing run.
  release:
    name: Release (signed .dmg)
    runs-on: macos-26
    # Auto-release on every merge to main (and on explicit v* tags). Gated on
    # rust+frontend only: the heavy/flaky e2e job still runs as a check, but must
    # not block shipping a build from a merge.
    needs: [rust, frontend]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    # Needed for the Publish step to create the GitHub Release + upload assets.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: ./.github/actions/build-llama-sidecar

      # T091 finding: Tauri's dmg bundler shells out to `create-dmg`, which
      # is not preinstalled by default and isn't a cargo/npm dependency —
      # confirmed by a local release build failing with "failed to run
      # bundle_dmg.sh" until this was installed via Homebrew. `brew install`
      # is a safe no-op if the runner image already has it.
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build .dmg (signed if a cert is configured, else unsigned)
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # No Developer ID configured yet -> build UNSIGNED. Passing an EMPTY
          # APPLE_CERTIFICATE makes tauri attempt `security import` on nothing
          # and fail ("failed to import keychain certificate"); unset the whole
          # signing env so tauri skips codesign entirely. Set the secrets later
          # to get a signed, notarized build with no further change.
          if [ -z "${APPLE_SIGNING_IDENTITY:-}" ]; then
            echo "No Apple signing identity -> building UNSIGNED."
            unset APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID
          fi
          npm run tauri build

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: doce-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      # The release tag: an explicit `v*` tag when pushed as one, otherwise a
      # fresh per-merge tag `v<pkgVersion>.<runNumber>` (e.g. v0.1.0.42) so each
      # merge to main publishes a NEW, uniquely-tagged release.
      - name: Compute release tag
        id: relver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            VERSION=$(node -p "require('./package.json').version")
            TAG="v${VERSION}.${GITHUB_RUN_NUMBER}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      # Publish the GitHub Release + attach the .dmg. `make_latest: true` forces
      # `releases/latest` (the landing page's download button target) to resolve
      # to this build, so the public download always tracks the newest merge.
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.relver.outputs.tag }}
          name: doce ${{ steps.relver.outputs.tag }}
          make_latest: true
          files: src-tauri/target/release/bundle/dmg/*.dmg
          fail_on_unmatched_files: true
          generate_release_notes: true
