name: Build llama-server sidecar
description: >
  Build (or restore from cache) the bundled llama-server sidecar that
  `tauri_build` requires as an externalBin. Without it, ANY cargo command in
  src-tauri fails its build script with "resource path
  binaries/llama-server-... doesn't exist". Keyed on the build script so a pin
  bump (LLAMA_TAG) invalidates the cache.
runs:
  using: composite
  steps:
    - name: Restore sidecar from cache
      id: cache
      uses: actions/cache@v4
      with:
        path: src-tauri/binaries/llama-server-aarch64-apple-darwin
        key: llama-sidecar-${{ runner.os }}-${{ hashFiles('scripts/build-llama-server.sh') }}

    - name: Build llama-server sidecar (cache miss)
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        command -v cmake >/dev/null 2>&1 || brew install cmake
        ./scripts/build-llama-server.sh
